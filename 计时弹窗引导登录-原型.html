<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>微页面计时弹窗引导登录 · 原型</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ==================== 调试面板（原型演示用） ==================== */
        .debug-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.12);
            padding: 20px;
            z-index: 9999;
            width: 260px;
            font-size: 13px;
        }
        .debug-panel h3 {
            font-size: 14px;
            color: #333;
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .debug-panel h3::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #07c160;
            border-radius: 50%;
        }
        .debug-panel h3 .title-text {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
        }
        .debug-collapse {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            background: #f5f5f5;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #999;
            transition: all 0.2s;
        }
        .debug-collapse:hover {
            background: #eee;
            color: #666;
        }
        .debug-panel.collapsed {
            padding: 10px 14px;
            width: auto;
        }
        .debug-panel.collapsed .debug-content {
            display: none;
        }
        .debug-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .debug-row label {
            color: #666;
            font-size: 12px;
        }
        .debug-row input[type="number"] {
            width: 60px;
            padding: 4px 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            text-align: center;
            font-size: 13px;
        }
        .debug-row input:focus {
            outline: none;
            border-color: #07c160;
        }
        .debug-btns {
            display: flex;
            gap: 8px;
            margin-top: 14px;
        }
        .debug-btn {
            flex: 1;
            padding: 8px 0;
            border-radius: 8px;
            border: none;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .debug-btn-primary {
            background: #07c160;
            color: #fff;
        }
        .debug-btn-primary:active { background: #06ad56; }
        .debug-btn-secondary {
            background: #f5f5f5;
            color: #666;
        }
        .debug-btn-secondary:active { background: #eee; }
        .debug-status {
            margin-top: 12px;
            padding: 8px 10px;
            background: #f9f9f9;
            border-radius: 6px;
            font-size: 11px;
            color: #999;
            line-height: 1.6;
            word-break: break-all;
        }
        .debug-status .val { color: #07c160; font-weight: 500; }
        .debug-status .warn { color: #e6a23c; }

        /* ==================== 手机容器 ==================== */
        .phone {
            width: 375px;
            height: 720px;
            background: #fff;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* 状态栏 */
        .status-bar {
            height: 44px;
            background: #fff;
            display: flex;
            align-items: flex-end;
            padding: 0 24px 8px;
            justify-content: space-between;
            font-size: 12px;
            font-weight: 600;
            color: #333;
        }

        /* 导航栏 */
        .nav-bar {
            height: 44px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            border-bottom: 1px solid #f0f0f0;
        }
        .nav-back {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #333;
        }
        .nav-title {
            flex: 1;
            text-align: center;
            font-size: 17px;
            font-weight: 600;
            color: #333;
            margin-right: 32px;
        }

        /* 微页面内容 */
        .page-content {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .page-content::-webkit-scrollbar { display: none; }

        /* Banner */
        .banner {
            width: 100%;
            height: 220px;
            background: linear-gradient(135deg, #2d1b0e 0%, #6b4423 40%, #c8956c 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 30px;
            position: relative;
            overflow: hidden;
        }
        .banner::before {
            content: '';
            position: absolute;
            top: -40px;
            right: -40px;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
        }
        .banner::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: -20px;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255,255,255,0.04);
        }
        .banner-tag {
            font-size: 11px;
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 14px;
            letter-spacing: 2px;
        }
        .banner-title {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 3px;
            margin-bottom: 8px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .banner-sub {
            font-size: 13px;
            opacity: 0.8;
            letter-spacing: 1px;
        }

        /* 产品卡片 */
        .section {
            padding: 16px;
        }
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title::before {
            content: '';
            width: 3px;
            height: 16px;
            background: #07c160;
            border-radius: 2px;
        }
        .product-card {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            margin-bottom: 12px;
        }
        .product-img {
            width: 100%;
            height: 160px;
            background: linear-gradient(135deg, #e8ddd0 0%, #c8b09a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            color: #8b7355;
            letter-spacing: 1px;
        }
        .product-info {
            padding: 14px 16px;
        }
        .product-name {
            font-size: 15px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }
        .product-desc {
            font-size: 12px;
            color: #999;
            line-height: 1.5;
            margin-bottom: 10px;
        }
        .product-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .product-price {
            color: #c0392b;
            font-size: 18px;
            font-weight: 700;
        }
        .product-price span {
            font-size: 12px;
            font-weight: 400;
        }
        .product-btn {
            padding: 6px 16px;
            background: #07c160;
            color: #fff;
            font-size: 12px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
        }
        .product-btn:active { background: #06ad56; }

        /* 会员权益区域 */
        .benefit-section {
            background: linear-gradient(135deg, #fffbf0 0%, #fff5e0 100%);
            margin: 0 16px 16px;
            border-radius: 12px;
            padding: 16px;
        }
        .benefit-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 12px;
        }
        .benefit-item {
            text-align: center;
        }
        .benefit-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 6px;
            font-size: 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .benefit-label {
            font-size: 11px;
            color: #8b6914;
        }

        /* 底部状态栏 */
        .user-status-bar {
            padding: 10px 16px;
            background: #f8f8f8;
            border-top: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
        }
        .user-status {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .user-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        .user-avatar.logged { background: #07c160; color: #fff; }
        .status-text { color: #999; }
        .status-text.logged { color: #07c160; }
        .timer-display {
            font-family: monospace;
            color: #999;
            font-size: 12px;
        }
        .timer-display.active { color: #07c160; }

        /* ==================== 登录弹窗 ==================== */
        .popup-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 100;
            display: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .popup-overlay.show {
            display: block;
            opacity: 1;
        }

        .popup-container {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 101;
            transform: translateY(100%);
            transition: transform 0.3s ease-out;
        }
        .popup-container.show {
            transform: translateY(0);
        }

        .popup-body {
            background: #fff;
            border-radius: 16px 16px 0 0;
            padding: 0 0 env(safe-area-inset-bottom, 20px);
        }

        .popup-handle {
            width: 36px;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin: 10px auto 0;
        }



        .popup-header {
            text-align: center;
            padding: 20px 40px 0;
        }
        .popup-icon {
            width: 56px;
            height: 56px;
            background: #fff;
            border-radius: 50%;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            overflow: hidden;
            padding: 6px;
        }
        .popup-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .popup-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }
        .popup-desc {
            font-size: 13px;
            color: #999;
            line-height: 1.5;
        }

        .popup-image {
            margin: 16px 20px 0;
            border-radius: 10px;
            overflow: hidden;
            height: 120px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 13px;
            letter-spacing: 1px;
        }
        .popup-image.hidden { display: none; }

        .popup-benefits {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 16px 20px;
        }
        .popup-benefit {
            text-align: center;
        }
        .popup-benefit-icon {
            font-size: 22px;
            margin-bottom: 4px;
        }
        .popup-benefit-text {
            font-size: 11px;
            color: #666;
        }

        .popup-actions {
            padding: 8px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .popup-btn-login {
            width: 100%;
            height: 44px;
            border-radius: 22px;
            background: linear-gradient(135deg, #07c160 0%, #06ad56 100%);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
        }
        .popup-btn-login:active {
            transform: scale(0.98);
            opacity: 0.9;
        }
        .popup-btn-cancel {
            width: 100%;
            height: 40px;
            border-radius: 20px;
            background: transparent;
            color: #999;
            font-size: 14px;
            border: none;
            cursor: pointer;
        }
        .popup-btn-cancel:active {
            background: #f5f5f5;
        }

        /* ==================== 登录页 ==================== */
        .login-page {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #fff;
            z-index: 200;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        .login-page.show {
            display: flex;
        }
        .login-logo {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .login-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        .login-subtitle {
            font-size: 13px;
            color: #999;
            margin-bottom: 40px;
        }
        .login-input-group {
            width: 100%;
            margin-bottom: 16px;
        }
        .login-input {
            width: 100%;
            height: 48px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 0 16px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .login-input:focus { border-color: #07c160; }
        .login-btn {
            width: 100%;
            height: 48px;
            border-radius: 24px;
            background: #07c160;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            margin-top: 8px;
            letter-spacing: 1px;
        }
        .login-btn:active { background: #06ad56; }
        .login-back {
            margin-top: 20px;
            font-size: 13px;
            color: #999;
            cursor: pointer;
            background: none;
            border: none;
        }

        /* ==================== 已登录状态 toast ==================== */
        .toast {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 300;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        /* 动画 */
        @keyframes slideInUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        @keyframes slideOutDown {
            from { transform: translateY(0); }
            to { transform: translateY(100%); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
    </style>
</head>
<body>

<!-- ==================== 调试面板 ==================== -->
<div class="debug-panel" id="debugPanel">
    <h3>
        <span class="title-text">原型控制台</span>
        <button class="debug-collapse" onclick="toggleCollapse()" id="collapseBtn" title="收起面板">−</button>
    </h3>
    <div class="debug-content">
    <div class="debug-row">
        <label>计时时长（秒）</label>
        <input type="number" id="timerInput" value="5" min="0" max="60">
    </div>
    <div class="debug-btns">
        <button class="debug-btn debug-btn-primary" onclick="resetAndStart()">重置并开始</button>
        <button class="debug-btn debug-btn-secondary" onclick="toggleLogin()">切换登录</button>
    </div>
    <div class="debug-row" style="margin-top: 12px; border-top: 1px solid #eee; padding-top: 12px;">
        <label>弹窗图片</label>
        <select id="imageMode" onchange="toggleImageMode()" style="padding: 4px 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; background: #fff;">
            <option value="none">无图片</option>
            <option value="with">有图片</option>
        </select>
    </div>
    <div class="debug-status" id="debugStatus">
        状态：<span class="val">未登录</span><br>
        计时器：<span class="val">未启动</span><br>
        弹窗：<span class="val">未弹出</span>
    </div>
    </div>
</div>

<!-- ==================== 手机容器 ==================== -->

    <!-- ==================== 登录页 ==================== -->
    <div class="login-page" id="loginPage">

        </div>
        <button class="login-btn" onclick="doLogin()">登录 / 注册</button>
        <button class="login-back" onclick="goBack()">返回微页面</button>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>
</div>

<script>
    // ==================== 状态管理 ====================
    let isLoggedIn = false;
    let timerId = null;
    let remainingSeconds = 0;
    let popupShown = false;
    let countdownId = null;
    let hasImage = false; // 是否显示弹窗图片

    // ==================== 初始化 ====================
    function init() {
        const duration = parseInt(document.getElementById('timerInput').value) || 5;
        if (isLoggedIn) {
            updateDebugStatus();
            return;
        }
        startTimer(duration);
    }

    // ==================== 计时器 ====================
    function startTimer(seconds) {
        clearTimer();
        remainingSeconds = seconds;
        popupShown = false;
        updateTimerDisplay();
        updateDebugStatus();

        countdownId = setInterval(() => {
            remainingSeconds--;
            updateTimerDisplay();
            if (remainingSeconds <= 0) {
                clearInterval(countdownId);
                countdownId = null;
                onTimerEnd();
            }
            updateDebugStatus();
        }, 1000);
    }

    function clearTimer() {
        if (countdownId) {
            clearInterval(countdownId);
            countdownId = null;
        }
        if (timerId) {
            clearTimeout(timerId);
            timerId = null;
        }
        remainingSeconds = 0;
        updateTimerDisplay();
    }

    function onTimerEnd() {
        if (isLoggedIn) return;
        showPopup();
    }

    function updateTimerDisplay() {
        const el = document.getElementById('timerDisplay');
        if (countdownId && remainingSeconds > 0) {
            el.textContent = `计时 ${remainingSeconds}s`;
            el.classList.add('active');
        } else {
            el.textContent = '';
            el.classList.remove('active');
        }
    }

    // ==================== 弹窗 ====================
    function showPopup() {
        if (popupShown) return;
        popupShown = true;
        
        // 根据图片模式设置弹窗图片显示
        const popupImage = document.getElementById('popupImage');
        if (hasImage) {
            popupImage.classList.remove('hidden');
        } else {
            popupImage.classList.add('hidden');
        }
        
        document.getElementById('popupOverlay').classList.add('show');
        document.getElementById('popupContainer').classList.add('show');
        updateDebugStatus();
    }
    
    // ==================== 图片模式切换 ====================
    function toggleImageMode() {
        const mode = document.getElementById('imageMode').value;
        hasImage = (mode === 'with');
        
        // 如果弹窗正在显示，立即更新
        if (popupShown) {
            const popupImage = document.getElementById('popupImage');
            if (hasImage) {
                popupImage.classList.remove('hidden');
            } else {
                popupImage.classList.add('hidden');
            }
        }
        
        const modeText = hasImage ? '有图片' : '无图片';
        showToast(`弹窗图片：${modeText}`);
        updateDebugStatus();
    }

    function closePopup() {
        popupShown = true; // 关闭后不再弹出
        document.getElementById('popupOverlay').classList.remove('show');
        document.getElementById('popupContainer').classList.remove('show');
        updateDebugStatus();
    }

    // ==================== 登录 ====================
    function goLogin() {
        document.getElementById('loginPage').classList.add('show');
    }

    function goBack() {
        document.getElementById('loginPage').classList.remove('show');
    }

    function doLogin() {
        const phone = document.getElementById('phoneInput').value;
        if (!phone || phone.length < 11) {
            showToast('请输入有效手机号');
            return;
        }
        isLoggedIn = true;
        closePopup();
        document.getElementById('loginPage').classList.remove('show');
        document.getElementById('userAvatar').classList.add('logged');
        document.getElementById('userAvatar').innerHTML = '&#10003;';
        document.getElementById('statusText').textContent = '已登录';
        document.getElementById('statusText').classList.add('logged');
        clearTimer();
        showToast('登录成功');
        updateDebugStatus();
    }

    // ==================== 调试面板 ====================
    function resetAndStart() {
        isLoggedIn = false;
        popupShown = false;
        closePopup();
        document.getElementById('loginPage').classList.remove('show');
        document.getElementById('userAvatar').classList.remove('logged');
        document.getElementById('userAvatar').innerHTML = '&#128100;';
        document.getElementById('statusText').textContent = '未登录';
        document.getElementById('statusText').classList.remove('logged');
        document.getElementById('phoneInput').value = '';
        const duration = parseInt(document.getElementById('timerInput').value) || 5;
        startTimer(duration);
        showToast('已重置，计时开始');
    }

    function toggleLogin() {
        if (isLoggedIn) {
            isLoggedIn = false;
            document.getElementById('userAvatar').classList.remove('logged');
            document.getElementById('userAvatar').innerHTML = '&#128100;';
            document.getElementById('statusText').textContent = '未登录';
            document.getElementById('statusText').classList.remove('logged');
            showToast('已退出登录');
        } else {
            isLoggedIn = true;
            closePopup();
            clearTimer();
            document.getElementById('userAvatar').classList.add('logged');
            document.getElementById('userAvatar').innerHTML = '&#10003;';
            document.getElementById('statusText').textContent = '已登录';
            document.getElementById('statusText').classList.add('logged');
            showToast('已模拟登录');
        }
        updateDebugStatus();
    }

    // ==================== 收起/展开面板 ====================
    let isCollapsed = false;
    function toggleCollapse() {
        const panel = document.getElementById('debugPanel');
        const btn = document.getElementById('collapseBtn');
        isCollapsed = !isCollapsed;
        
        if (isCollapsed) {
            panel.classList.add('collapsed');
            btn.textContent = '+';
            btn.title = '展开面板';
        } else {
            panel.classList.remove('collapsed');
            btn.textContent = '−';
            btn.title = '收起面板';
        }
    }

    function updateDebugStatus() {
        const el = document.getElementById('debugStatus');
        let timerText = '未启动';
        if (countdownId && remainingSeconds > 0) {
            timerText = `<span class="val">倒计时 ${remainingSeconds}s</span>`;
        } else if (popupShown) {
            timerText = '<span class="warn">已结束</span>';
        }
        let popupText = popupShown ? '<span class="warn">已弹出</span>' : '未弹出';
        let loginText = isLoggedIn ? '<span class="val">已登录</span>' : '未登录';
        let imageText = hasImage ? '<span class="val">有图片</span>' : '无图片';
        el.innerHTML = `状态：${loginText}<br>计时器：${timerText}<br>弹窗：${popupText}<br>图片：${imageText}`;
    }

    // ==================== Toast ====================
    function showToast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 1500);
    }

    // ==================== 启动 ====================
    init();
</script>
</body>
</html>
