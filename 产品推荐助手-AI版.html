<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小多吉 AI版 - 松赞产品助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #F8F6F3;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 680px;
            height: 100vh;
            max-height: 900px;
            background: #F8F6F3;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* 头部导航 */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: #F8F6F3;
            position: relative;
            z-index: 10;
        }

        .header-left {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-title {
            font-size: 17px;
            font-weight: 600;
            color: #333;
        }

        .header-right {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        /* 聊天区域 */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px 100px;
            position: relative;
        }

        .chat-area::-webkit-scrollbar {
            display: none;
        }

        /* 欢迎卡片 */
        .welcome-section {
            text-align: center;
            padding: 40px 20px;
            margin-left: -24px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #C9A96E 0%, #E8D5B5 100%);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 4px 20px rgba(201, 169, 110, 0.3);
        }

        .welcome-title {
            font-size: 22px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .welcome-title span {
            color: #C9A96E;
        }

        .welcome-subtitle {
            font-size: 18px;
            color: #666;
            margin-bottom: 16px;
        }

        .welcome-desc {
            font-size: 14px;
            color: #999;
            line-height: 1.8;
            max-width: 280px;
            margin: 0 auto;
        }

        /* 消息气泡 */
        .message {
            margin-bottom: 16px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-content {
            background: #fff;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            font-size: 14px;
            line-height: 1.7;
            color: #333;
        }

        .message.user .message-content {
            background: #C9A96E;
            color: #fff;
            margin-left: 40px;
        }

        /* 产品卡片 */
        .product-card {
            background: #fff;
            border-radius: 16px;
            padding: 16px;
            margin-top: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }

        .product-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
        }

        .product-image {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #F5F0E8 0%, #EDE6DC 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
        }

        .product-info {
            flex: 1;
        }

        .product-name {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        .product-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .tag {
            background: #F5F0E8;
            color: #8B7355;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 11px;
        }

        /* 亮点区域 */
        .highlights {
            background: #FAF8F5;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .highlights-title {
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .highlight-item {
            font-size: 13px;
            color: #666;
            line-height: 1.8;
            padding: 4px 0;
            border-bottom: 1px dashed #E8E4DE;
        }

        .highlight-item:last-child {
            border-bottom: none;
        }

        /* 行程时间线 */
        .itinerary {
            margin-top: 12px;
        }

        .itinerary-title {
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .itinerary-list {
            position: relative;
            padding-left: 20px;
        }

        .itinerary-list::before {
            content: '';
            position: absolute;
            left: 6px;
            top: 8px;
            bottom: 8px;
            width: 2px;
            background: #E8D5B5;
        }

        .itinerary-item {
            position: relative;
            padding: 10px 0;
            border-bottom: 1px solid #F5F0E8;
        }

        .itinerary-item:last-child {
            border-bottom: none;
        }

        .itinerary-item::before {
            content: '';
            position: absolute;
            left: -18px;
            top: 14px;
            width: 8px;
            height: 8px;
            background: #C9A96E;
            border-radius: 50%;
            border: 2px solid #fff;
        }

        .itinerary-day {
            font-size: 12px;
            font-weight: 600;
            color: #C9A96E;
            margin-bottom: 2px;
        }

        .itinerary-location {
            font-size: 13px;
            color: #333;
            font-weight: 500;
            margin-bottom: 2px;
        }

        .itinerary-activity {
            font-size: 12px;
            color: #999;
        }

        /* 价格区域 */
        .price-section {
            background: linear-gradient(135deg, #FAF8F5 0%, #F5F0E8 100%);
            border-radius: 12px;
            padding: 16px;
            margin-top: 12px;
            text-align: center;
        }

        .price-main {
            font-size: 32px;
            font-weight: 700;
            color: #C9A96E;
        }

        .price-unit {
            font-size: 13px;
            color: #999;
            margin-top: 4px;
        }

        .price-detail {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed #E8D5B5;
        }

        .price-note {
            font-size: 11px;
            color: #999;
            background: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            margin-top: 10px;
            text-align: left;
        }

        /* 底部区域 */
        .bottom-section {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: #F8F6F3;
            padding: 0 16px 20px;
        }

        /* 快捷功能卡片 */
        .quick-cards {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            overflow-x: auto;
            padding: 4px 0;
        }

        .quick-cards::-webkit-scrollbar {
            display: none;
        }

        .quick-card {
            flex-shrink: 0;
            width: 140px;
            background: #fff;
            border-radius: 12px;
            padding: 14px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .quick-card:active {
            transform: scale(0.98);
        }

        .quick-card-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .quick-card-text {
            font-size: 13px;
            color: #333;
            line-height: 1.5;
        }

        /* 输入区域 */
        .input-area {
            background: #fff;
            border-radius: 24px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }

        .voice-btn {
            width: 36px;
            height: 36px;
            background: #333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
            flex-shrink: 0;
            cursor: pointer;
        }

        .input-box {
            flex: 1;
            border: none;
            outline: none;
            font-size: 15px;
            color: #333;
            background: transparent;
            font-family: inherit;
        }

        .input-box::placeholder {
            color: #ccc;
        }

        .send-btn {
            width: 36px;
            height: 36px;
            background: #C9A96E;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
            flex-shrink: 0;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .send-btn:disabled {
            background: #ccc;
        }

        /* 加载动画 */
        .loading {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .loading span {
            width: 8px;
            height: 8px;
            background: #C9A96E;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading span:nth-child(1) { animation-delay: -0.32s; }
        .loading span:nth-child(2) { animation-delay: -0.16s; }
        .loading span:nth-child(3) { animation-delay: 0s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }


        /* 库存卡片 */
        .inventory-card {
            background: #fff;
            border-radius: 16px;
            padding: 16px;
            margin-top: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }

        .inventory-hotel {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .inventory-dates {
            font-size: 13px;
            color: #666;
            margin-bottom: 12px;
        }

        /* 库存表格 */
        .inventory-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            margin-top: 4px;
        }

        .inventory-table th {
            background: #FAF6EF;
            color: #8B6F47;
            font-weight: 600;
            text-align: left;
            padding: 8px 10px;
            border-bottom: 2px solid #E8D5B5;
            white-space: nowrap;
        }

        .inventory-table td {
            padding: 9px 10px;
            border-bottom: 1px solid #F0EBE3;
            color: #333;
            vertical-align: middle;
        }

        .inventory-table tr:last-child td {
            border-bottom: none;
        }

        .inventory-table tr:hover td {
            background: #FDFAF6;
        }

        .inventory-loading {
            text-align: center;
            padding: 20px;
            color: #999;
        }

        /* AI 打字光标 */
        .ai-cursor {
            display: inline-block;
            color: #C9A96E;
            animation: blink 0.8s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <div class="header-left"></div>
            <div class="header-title">小多吉 <span style="font-size:12px;background:#C9A96E;color:#fff;padding:2px 7px;border-radius:10px;vertical-align:middle;">AI</span></div>
            <div class="header-right"></div>
        </div>

        <!-- 聊天区域 -->
        <div class="chat-area" id="chatArea">
            <!-- 欢迎语 -->
            <div class="welcome-section">
                <div class="avatar">👩‍🌾</div>
                <div class="welcome-title">我叫<span>小多吉</span></div>
                <div class="welcome-subtitle">是您的产品助手</div>
                <div class="welcome-desc">
                    我可以为你快速解答旅行产品的行程信息、价格等问题，能推荐适合的旅行产品，也可以帮您快速下单哦
                </div>
            </div>
        </div>

        <!-- 底部区域 -->
        <div class="bottom-section">
            <!-- 输入框 -->
            <div class="input-area">
                <input type="text" class="input-box" id="userInput" placeholder="请输入消息">
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
            </div>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        // ============================================
        // 酒店代码映射（来自酒店表 2026-04-03）
        // ============================================
        const HOTEL_CODES = {
            // 南迦巴瓦
            '南迦巴瓦': 'STNJBW', '达林': 'STNJBW', '达': 'STNJBW',
            // 梅里
            '梅里': 'STML', '梅': 'STML',
            // 石月亮
            '石月亮': 'STSHYL', '石': 'STSHYL',
            // 香格里拉林卡
            '香格里拉林卡': 'STLKSGL', '香格里拉': 'STLKSGL', '香': 'STLKSGL',
            // 绿谷
            '绿谷': 'STLG', '绿': 'STLG',
            // 塔城
            '塔城': 'STTC', '塔': 'STTC',
            // 奔子栏
            '奔子栏': 'STBZL', '奔': 'STBZL',
            // 丙中洛
            '丙中洛': 'STBZHL', '丙': 'STBZHL',
            // 茨中
            '茨中': 'STCZH', '茨': 'STCZH',
            // 巴松措
            '巴松措': 'STLKBSC', '巴': 'STLKBSC', '巴松': 'STLKBSC',
            // 拉萨
            '拉萨': 'STLKLS', '拉': 'STLKLS',
            // 百巴
            '百巴': 'STBBZP', '百': 'STBBZP',
            // 来古
            '来古': 'STRWLG', '来': 'STRWLG',
            // 波密
            '波密': 'STBMLK', '波': 'STBMLK',
            // 丽江
            '丽江': 'STLKLJ', '丽': 'STLKLJ',
            // 普洱
            '普洱': 'STPELG', '普': 'STPELG',
            // 亚丁
            '亚丁': 'STYD', '亚': 'STYD',
            // 如美
            '如美': 'STMKRM',
            // 泸沽湖（英迪格）
            '泸沽湖': 'LGLHOTEL', '泸': 'LGLHOTEL'
        };

        const HOTEL_NAMES = {
            'STNJBW': '松赞南迦巴瓦山居',
            'STML': '松赞梅里山居',
            'STSHYL': '松赞石月亮山居',
            'STLKSGL': '松赞香格里拉林卡',
            'STLG': '松赞绿谷山居',
            'STTC': '松赞塔城山居',
            'STBZL': '松赞奔子栏山居',
            'STBZHL': '松赞丙中洛山居',
            'STCZH': '松赞茨中山居',
            'STLKBSC': '松赞巴松措林卡',
            'STLKLS': '松赞拉萨林卡',
            'STBBZP': '松赞百巴帐篷营地',
            'STRWLG': '松赞来古山居',
            'STBMLK': '松赞波密山居',
            'STLKLJ': '松赞丽江山居',
            'STPELG': '松赞普洱绿谷',
            'STYD': '松赞亚丁山居',
            'STMKRM': '松赞如美山居',
            'LGLHOTEL': '泸沽湖英迪格酒店'
        };

        // API配置
        const INVENTORY_API = 'https://gds.songtsam.com/product-room/bks/productType/listPrSingleOrderRoom';

        // 从 JWT 解码 userCode（用于库存API）
        function getUserCodeFromToken(token) {
            try {
                const parts = token.split('.');
                if (parts.length >= 2) {
                    const payload = JSON.parse(atob(parts[1]));
                    return payload.userCode || 'HL';
                }
            } catch (e) {}
            return 'HL';
        }

        // 固定请求参数
        const INVENTORY_DEFAULT_PARAMS = {
            hotelGroupCode: 'SONGTSAM',
            otaChannel: 'CRS',
            maxMemberLevel: '002',
            unitCode: 'SONGTSAM'
        };

        // ============================================
        // 自然语言解析 - 团期号查询
        // ============================================
        function parseQueryForGroups(query) {
            const q = query.toLowerCase();

            // 识别"查团期号"的意图关键词
            const groupKeywords = [
                '团期号', '团期', '出发日期', '几号出发', '哪天出发',
                '有哪些日期', '有什么日期', '这个月有', '下个月有',
                '几号', '有没有团', '有团吗', '可以发团吗'
            ];
            const isGroupQuery = groupKeywords.some(k => q.includes(k));
            if (!isGroupQuery) return null;

            // 提取产品名（支持简称和全称）
            let productName = '';
            const productPatterns = [
                // 简称（叠字）：波波来来、达巴巴拉拉、丽丽塔塔绿绿
                /([\u4e00-\u9fa5][\u4e00-\u9fa5])\1{1,}/g,
                // 产品名：亚丁远山、林芝波密7天、冰川环线
                /(?:亚丁远山|冰川环线|冰川线|拉萨环线|梅里环线|香格里拉环线|桃花节|杜鹃季|低空)/g,
            ];
            for (const pattern of productPatterns) {
                const match = query.match(pattern);
                if (match) {
                    productName = match[0];
                    break;
                }
            }
            // 手动补充常用产品名
            if (!productName) {
                const knownProducts = [
                    '亚丁远山', '亚丁', '初探亚丁', '天人之际', '回到远方的家',
                    '梅里', '石月亮', '丙中洛', '茨中', '奔子栏',
                    '波波来来', '波波百巴巴', '波波墨波达', '波波来波达',
                    '来古', '巴松措', '南迦巴瓦', '达林', '拉萨',
                    '林芝', '波密', '林芝波密', '香格里拉', '塔城', '奔子栏',
                    '穿越三江', '三江并流', '怒江', '泸沽湖'
                ];
                for (const p of knownProducts) {
                    if (q.includes(p)) {
                        productName = p;
                        break;
                    }
                }
            }

            // 提取月份
            let month = null;
            const monthMatch = q.match(/(\d+)月/);
            if (monthMatch) {
                const m = parseInt(monthMatch[1]);
                month = `2026-${String(m).padStart(2, '0')}`;
            } else if (q.includes('本月') || q.includes('这个月')) {
                const now = new Date();
                month = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2, '0')}`;
            } else if (q.includes('下个月')) {
                const now = new Date();
                now.setMonth(now.getMonth() + 1);
                month = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2, '0')}`;
            }

            return { productName, month };
        }

        async function queryGroupsDirect(keyword, month) {
            const resp = await fetch(`${API_BASE}/api/groups-direct`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ keyword, month, max_groups: 20 })
            });
            return await resp.json();
        }

        function renderGroupsResult(data, keyword) {
            if (!data.success) {
                return `<p style="color:#d32f2f;">⚠️ 查询失败：${data.error || '未知错误'}</p>`;
            }

            const products = data.products || [];
            if (products.length === 0) {
                return `<p style="color:#999;">未找到「${keyword}」相关产品团期，请换个关键词试试。</p>`;
            }

            let html = '';
            products.forEach(p => {
                const nights = p.nights ? `${p.nights}晚${p.days || (p.nights+1)}天` : '';
                const tags = (p.tags || '').split(',').filter(t => t && !['私享管家','主题团','自由行'].includes(t)).slice(0,3).join(' · ');
                const title = p.title || p.travel_type || keyword;

                html += `<div style="margin:12px 0;padding:14px;background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06);">`;
                html += `<div style="font-weight:600;color:#5a3e2b;margin-bottom:4px;">${title}</div>`;
                if (nights || tags) {
                    html += `<div style="font-size:12px;color:#999;margin-bottom:10px;">${nights}${nights && tags ? ' · ' : ''}${tags}</div>`;
                }

                const groups = p.groups || [];
                if (groups.length === 0) {
                    html += `<div style="font-size:13px;color:#aaa;">暂无可售团期</div>`;
                } else {
                    groups.forEach(g => {
                        const endText = g.end && g.end !== g.begin ? ` → ${g.end}` : '';
                        html += `

        // ============================================
        // 自然语言解析 - 库存查询
        // ============================================
        function parseQueryForInventory(query) {
            const q = query.toLowerCase();

            // 检测是否是库存查询请求
            const inventoryKeywords = ['房间', '房价', '有房', '订房', '房间价格', '酒店', '山居', '林卡', '营'];
            const isInventoryQuery = inventoryKeywords.some(k => q.includes(k));

            if (!isInventoryQuery) return null;

            // 提取酒店名称
            let hotelCode = null;
            for (const [name, code] of Object.entries(HOTEL_CODES)) {
                if (q.includes(name.toLowerCase())) {
                    hotelCode = code;
                    break;
                }
            }

            // 如果没找到具体酒店，返回提示
            if (!hotelCode) {
                return { type: 'need_hotel' };
            }

            // 提取日期
            let beginDate = null, endDate = null;

            // 匹配 "4月22日" 或 "4月22"
            const dateMatch = q.match(/(\d{1,2})月(\d{1,2})[日]?/);
            if (dateMatch) {
                const month = parseInt(dateMatch[1]);
                const day = parseInt(dateMatch[2]);
                const year = new Date().getFullYear();
                const checkin = new Date(year, month - 1, day);
                const checkout = new Date(checkin);
                checkout.setDate(checkout.getDate() + 1);
                beginDate = formatDate(checkin);
                endDate = formatDate(checkout);
            }

            // 匹配日期范围 "4月22日到4月23日"
            const rangeMatch = q.match(/(\d{1,2})月(\d{1,2})[日]?.*到.*(\d{1,2})月(\d{1,2})[日]?/);
            if (rangeMatch) {
                const year = new Date().getFullYear();
                beginDate = formatDate(new Date(year, parseInt(rangeMatch[1]) - 1, parseInt(rangeMatch[2])));
                endDate = formatDate(new Date(year, parseInt(rangeMatch[3]) - 1, parseInt(rangeMatch[4])));
            }

            // 匹配今晚/明晚
            if (q.includes('今晚')) {
                const today = new Date();
                beginDate = formatDate(today);
                endDate = formatDate(new Date(today.setDate(today.getDate() + 1)));
            } else if (q.includes('明晚')) {
                const tomorrow = new Date();
                tomorrow.setDate(tomorrow.getDate() + 1);
                beginDate = formatDate(tomorrow);
                endDate = formatDate(new Date(tomorrow.setDate(tomorrow.getDate() + 1)));
            }

            return {
                type: 'inventory',
                hotelCode,
                hotelName: HOTEL_NAMES[hotelCode] || hotelCode,
                beginDate,
                endDate
            };
        }

        function formatDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        // ============================================
        // 库存查询
        // ============================================
        async function queryInventory(hotelCode, beginDate, endDate, roomTypes = null) {
            const token = localStorage.getItem('songtsam_auth_token');
            if (!token) {
                return {
                    error: true,
                    message: '请先在设置中配置 Authorization Token'
                };
            }

            try {
                const userCode = getUserCodeFromToken(token);
                const requestBody = {
                    ...INVENTORY_DEFAULT_PARAMS,
                    beginDate: beginDate,  // 格式: YYYY-MM-DD
                    endDate: endDate,
                    hotelCodes: [hotelCode],  // 数组格式
                    rmtypes: roomTypes,  // 可选房型代码数组
                    userCode: userCode,
                };

                const resp = await fetch(INVENTORY_API, {
                    method: 'POST',
                    headers: {
                        'Authorization': token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestBody)
                });

                if (!resp.ok) {
                    const errText = await resp.text();
                    return {
                        error: true,
                        message: `请求失败 (${resp.status}): ${errText.substring(0, 100)}`
                    };
                }

                const data = await resp.json();
                return { error: false, data, hotelCode, beginDate, endDate };

            } catch(e) {
                return {
                    error: true,
                    message: `网络错误: ${e.message}`
                };
            }
        }

        // 过滤关键词
        const EXCLUDE_KEYWORDS = ['OTA', '飞猪', '携程'];

        // 过滤库存数据
        function filterInventoryData(entries) {
            return entries.filter(entry => {
                // 1. 产品状态：sta 为空或 'I' 才保留（null/空 表示有效房型）
                if (entry.sta && entry.sta !== 'I') return false;

                // 2. 产品名称不包含 OTA/飞猪/携程
                const productDesc = entry.productDesc || '';
                if (EXCLUDE_KEYWORDS.some(kw => productDesc.includes(kw))) return false;

                // 3. 业务类型不包含"目的地套餐"
                const categorySubDesc = entry.categorySubDesc || '';
                if (categorySubDesc.includes('目的地套餐')) return false;

                return true;
            });
        }

                    const blockText = row.blockNum > 0 ? `${row.blockNum}间` : '0间';
                    const priceText = row.realPrice > 0 ? `¥${row.realPrice.toLocaleString()}` : '—';

        // ============================================
        // AI 推荐（SSE 流式版本）
        // ============================================
        async function doRecommend(text) {
            // 创建占位消息气泡：先展示产品卡片，再展示 AI 打字
            const placeholderDiv = document.createElement('div');
            placeholderDiv.className = 'message';
            placeholderDiv.innerHTML = `<div class="message-content" id="aiMsgContent"><div class="loading"><span></span><span></span><span></span></div></div>`;
            chatArea.appendChild(placeholderDiv);

            const msgContent = document.getElementById('aiMsgContent');

            try {
                const response = await fetch(`${API_BASE}/api/ai-recommend`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: text })
                });

                if (!response.ok) throw new Error('AI推荐服务请求失败');

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let productsRendered = false;
                let aiTextDiv = null;
                let aiText = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); // 保留未完成行

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const jsonStr = line.slice(6).trim();
                        if (!jsonStr || jsonStr === '[DONE]') continue;

                        let evt;
                        try { evt = JSON.parse(jsonStr); } catch { continue; }

                        if (evt.type === 'products') {
                            // 渲染产品卡片
                            const structured = evt.data;
                            const cardsHtml = renderRecommendCards(structured);
                            msgContent.innerHTML = cardsHtml;
                            // 追加 AI 分析区域占位
                            aiTextDiv = document.createElement('div');
                            aiTextDiv.style.cssText = 'margin-top:12px;padding:12px;background:linear-gradient(135deg,#FAF8F5,#F5F0E8);border-radius:12px;font-size:13px;color:#555;line-height:1.8;';
                            aiTextDiv.innerHTML = '<span style="font-size:11px;color:#C9A96E;font-weight:600;">✦ 小多吉为您分析</span><br><span id="aiTypingText"></span><span class="ai-cursor">▌</span>';
                            msgContent.appendChild(aiTextDiv);
                            productsRendered = true;
                            // 不自动滚动，让用户自行浏览

                        } else if (evt.type === 'token') {
                            aiText += evt.content;
                            const typingEl = document.getElementById('aiTypingText');
                            if (typingEl) typingEl.textContent = aiText;

                        } else if (evt.type === 'done') {
                            // 移除光标
                            const cursor = msgContent.querySelector('.ai-cursor');
                            if (cursor) cursor.remove();
                        }
                    }
                }

                // 若产品和 AI 文字都没出来（服务离线）
                if (!productsRendered) {
                    msgContent.innerHTML = `
                        <p>⚠️ AI推荐服务暂不可用</p>
                        <p style="margin-top:8px;">请先启动推荐服务：</p>
                        <div style="margin-top:8px;padding:10px;background:#f5f5f5;border-radius:8px;font-size:12px;">
                            <code>./start_api.sh</code>
                        </div>
                    `;
                }

            } catch (error) {
                console.error('AI推荐失败:', error);
                msgContent.innerHTML = `
                    <p>⚠️ 推荐服务暂不可用（${error.message}）</p>
                    <p style="margin-top:8px;font-size:12px;color:#999;">请确认本地服务已启动：python3 recommend_api.py</p>
                `;
            }
        }

        function estimatePrice(productId, adults, children, isPrivate, season = '平季') {
            let product = PRODUCTS[productId];
            if (!product) product = PRODUCTS['雪山圣湖布达拉'];

            const adultUnit = product.prices[season] || product.prices['平季'];
            const childUnit = Math.round(adultUnit * 0.74);
            const total = adultUnit * adults + childUnit * children;
            const privateMultiplier = isPrivate ? 1.10 : 1.0;
            const finalTotal = Math.round(total * privateMultiplier);

            return {
                total: finalTotal,
                adultUnit: Math.round(adultUnit * privateMultiplier),
                childUnit: Math.round(childUnit * privateMultiplier),
                nights: product.nights,
                days: product.days,
                isPrivate,
                season,
                vehicle: product.vehicle
            };
        }

        function generateRecommendation(query) {
            const q = query.toLowerCase();

            let productId = '雪山圣湖布达拉';
            let productName = '雪山圣湖布达拉';
            let destination = '拉萨·巴松措';
            let tags = ['主题团', '雪山', '圣湖', '布达拉宫'];

            if (q.includes('丽江') || q.includes('远方的家')) {
                productId = '回到远方的家';
                productName = '回到远方的家';
                destination = '丽江·塔城·香格里拉';
                tags = ['主题团', '民族文化', '非遗'];
            } else if (q.includes('梅里')) {
                productId = '天人之际';
                productName = '天人之际';
                destination = '奔子栏·梅里·香格里拉';
                tags = ['主题团', '雪山', '摄影'];
            } else if (q.includes('波密') || q.includes('冰川')) {
                productId = '探索生命的力量';
                productName = '探索生命的力量';
                destination = '波密·来古·南迦巴瓦';
                tags = ['主题团', '冰川', '生态'];
            }

            let adults = 2, children = 0;
            const isPrivate = q.includes('私享') || q.includes('管家');

            if (q.includes('2大1小')) { adults = 2; children = 1; }
            else if (q.includes('3大1小')) { adults = 3; children = 1; }
            else if (q.includes('1大1小')) { adults = 1; children = 1; }
            else if (q.includes('亲子') || q.includes('儿童')) { children = 1; }

            let season = '平季';
            const monthMatch = q.match(/(\d{1,2})月/);
            if (monthMatch) {
                const month = parseInt(monthMatch[1]);
                if (month >= 4 && month <= 10) season = '旺季';
                else if (month >= 11 || month <= 3) season = '淡季';
            }
            if (q.includes('旺季') || q.includes('暑假')) season = '旺季';
            if (q.includes('淡季')) season = '淡季';
            if (q.includes('春节') || q.includes('国庆')) season = '节日';

            const product = PRODUCTS[productId];
            const priceData = estimatePrice(productId, adults, children, isPrivate, season);
            const formatPrice = (p) => '¥' + p.toLocaleString();

            const highlightsHtml = product.highlights.map(h => 
                `<div class="highlight-item">${h}</div>`
            ).join('');

            const itineraryHtml = product.itinerary.map(item => `
                <div class="itinerary-item">
                    <div class="itinerary-day">${item.day}</div>
                    <div class="itinerary-location">${item.location}</div>
                    <div class="itinerary-activity">${item.activity}</div>
                </div>
            `).join('');

            const priceNote = children > 0 
                ? `成人${formatPrice(priceData.adultUnit)}/人 × ${adults}人 + 儿童${formatPrice(priceData.childUnit)}/人 × ${children}人`
                : `${formatPrice(priceData.adultUnit)}/人 × ${adults}人`;

            return `
                <p>根据您的需求，为您推荐：</p>
                <div class="product-card">
                    <div class="product-header">
                        <div class="product-image">🏔️</div>
                        <div class="product-info">
                            <div class="product-name">${productName}</div>
                            <div class="product-tags">
                                ${tags.map(t => `<span class="tag">${t}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                    <div class="highlights">
                        <div class="highlights-title">🌟 产品特色</div>
                        ${highlightsHtml}
                    </div>
                    <div class="itinerary">
                        <div class="itinerary-title">📅 行程安排（${product.nights}晚${product.days}天）</div>
                        <div class="itinerary-list">
                            ${itineraryHtml}
                        </div>
                    </div>
                    <div class="price-section">
                        <div class="price-main">${formatPrice(priceData.total)}</div>
                        <div class="price-unit">${children > 0 ? '起/家庭' : '起/人'}（${isPrivate ? '私享管家' : '标准团'}）</div>
                        <div class="price-detail">${destination} · ${season}价格</div>
                        <div class="price-detail" style="margin-top:6px;font-size:11px;">${priceNote}</div>
                        ${children > 0 ? `<div class="price-note">💡 儿童含早餐及下午茶，不含松赞林寺/亚丁/巴松措门票</div>` : ''}
                    </div>
                </div>
            `;
        }
