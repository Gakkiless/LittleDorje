<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小多吉 - 松赞产品助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #F8F6F3;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 680px;
            height: 100vh;
            max-height: 900px;
            background: #F8F6F3;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* 头部导航 */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: #F8F6F3;
            position: relative;
            z-index: 10;
        }

        .header-left {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-title {
            font-size: 17px;
            font-weight: 600;
            color: #333;
        }

        .header-right {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        /* 聊天区域 */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px 100px;
            position: relative;
        }

        .chat-area::-webkit-scrollbar {
            display: none;
        }

        /* 欢迎卡片 */
        .welcome-section {
            text-align: center;
            padding: 40px 20px;
            margin-left: -24px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #C9A96E 0%, #E8D5B5 100%);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 4px 20px rgba(201, 169, 110, 0.3);
        }

        .welcome-title {
            font-size: 22px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .welcome-title span {
            color: #C9A96E;
        }

        .welcome-subtitle {
            font-size: 18px;
            color: #666;
            margin-bottom: 16px;
        }

        .welcome-desc {
            font-size: 14px;
            color: #999;
            line-height: 1.8;
            max-width: 280px;
            margin: 0 auto;
        }

        /* 消息气泡 */
        .message {
            margin-bottom: 16px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-content {
            background: #fff;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            font-size: 14px;
            line-height: 1.7;
            color: #333;
        }

        .message.user .message-content {
            background: #C9A96E;
            color: #fff;
            margin-left: 40px;
        }

        /* 产品卡片 */
        .product-card {
            background: #fff;
            border-radius: 16px;
            padding: 16px;
            margin-top: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }

        .product-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
        }

        .product-image {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #F5F0E8 0%, #EDE6DC 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
        }

        .product-info {
            flex: 1;
        }

        .product-name {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        .product-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .tag {
            background: #F5F0E8;
            color: #8B7355;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 11px;
        }

        /* 亮点区域 */
        .highlights {
            background: #FAF8F5;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .highlights-title {
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .highlight-item {
            font-size: 13px;
            color: #666;
            line-height: 1.8;
            padding: 4px 0;
            border-bottom: 1px dashed #E8E4DE;
        }

        .highlight-item:last-child {
            border-bottom: none;
        }

        /* 行程时间线 */
        .itinerary {
            margin-top: 12px;
        }

        .itinerary-title {
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .itinerary-list {
            position: relative;
            padding-left: 20px;
        }

        .itinerary-list::before {
            content: '';
            position: absolute;
            left: 6px;
            top: 8px;
            bottom: 8px;
            width: 2px;
            background: #E8D5B5;
        }

        .itinerary-item {
            position: relative;
            padding: 10px 0;
            border-bottom: 1px solid #F5F0E8;
        }

        .itinerary-item:last-child {
            border-bottom: none;
        }

        .itinerary-item::before {
            content: '';
            position: absolute;
            left: -18px;
            top: 14px;
            width: 8px;
            height: 8px;
            background: #C9A96E;
            border-radius: 50%;
            border: 2px solid #fff;
        }

        .itinerary-day {
            font-size: 12px;
            font-weight: 600;
            color: #C9A96E;
            margin-bottom: 2px;
        }

        .itinerary-location {
            font-size: 13px;
            color: #333;
            font-weight: 500;
            margin-bottom: 2px;
        }

        .itinerary-activity {
            font-size: 12px;
            color: #999;
        }

        /* 价格区域 */
        .price-section {
            background: linear-gradient(135deg, #FAF8F5 0%, #F5F0E8 100%);
            border-radius: 12px;
            padding: 16px;
            margin-top: 12px;
            text-align: center;
        }

        .price-main {
            font-size: 32px;
            font-weight: 700;
            color: #C9A96E;
        }

        .price-unit {
            font-size: 13px;
            color: #999;
            margin-top: 4px;
        }

        .price-detail {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed #E8D5B5;
        }

        .price-note {
            font-size: 11px;
            color: #999;
            background: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            margin-top: 10px;
            text-align: left;
        }

        /* 底部区域 */
        .bottom-section {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: #F8F6F3;
            padding: 0 16px 20px;
        }

        /* 快捷功能卡片 */
        .quick-cards {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            overflow-x: auto;
            padding: 4px 0;
        }

        .quick-cards::-webkit-scrollbar {
            display: none;
        }

        .quick-card {
            flex-shrink: 0;
            width: 140px;
            background: #fff;
            border-radius: 12px;
            padding: 14px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .quick-card:active {
            transform: scale(0.98);
        }

        .quick-card-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .quick-card-text {
            font-size: 13px;
            color: #333;
            line-height: 1.5;
        }

        /* 输入区域 */
        .input-area {
            background: #fff;
            border-radius: 24px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }

        .voice-btn {
            width: 36px;
            height: 36px;
            background: #333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
            flex-shrink: 0;
            cursor: pointer;
        }

        .input-box {
            flex: 1;
            border: none;
            outline: none;
            font-size: 15px;
            color: #333;
            background: transparent;
            font-family: inherit;
        }

        .input-box::placeholder {
            color: #ccc;
        }

        .send-btn {
            width: 36px;
            height: 36px;
            background: #C9A96E;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
            flex-shrink: 0;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .send-btn:disabled {
            background: #ccc;
        }

        /* 加载动画 */
        .loading {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .loading span {
            width: 8px;
            height: 8px;
            background: #C9A96E;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading span:nth-child(1) { animation-delay: -0.32s; }
        .loading span:nth-child(2) { animation-delay: -0.16s; }
        .loading span:nth-child(3) { animation-delay: 0s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }


        /* 库存卡片 */
        .inventory-card {
            background: #fff;
            border-radius: 16px;
            padding: 16px;
            margin-top: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }

        .inventory-hotel {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .inventory-dates {
            font-size: 13px;
            color: #666;
            margin-bottom: 12px;
        }

        /* 库存表格 */
        .inventory-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            margin-top: 4px;
        }

        .inventory-table th {
            background: #FAF6EF;
            color: #8B6F47;
            font-weight: 600;
            text-align: left;
            padding: 8px 10px;
            border-bottom: 2px solid #E8D5B5;
            white-space: nowrap;
        }

        .inventory-table td {
            padding: 9px 10px;
            border-bottom: 1px solid #F0EBE3;
            color: #333;
            vertical-align: middle;
        }

        .inventory-table tr:last-child td {
            border-bottom: none;
        }

        .inventory-table tr:hover td {
            background: #FDFAF6;
        }

        .inventory-loading {
            text-align: center;
            padding: 20px;
            color: #999;
        }



        /* 团期结果卡 */
        /* 团期表格 */
        .group-table-wrap {
            overflow-x: auto;
            margin-top: 8px;
        }
        .group-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .group-table th {
            background: #f5efe7;
            color: #666;
            font-weight: 600;
            padding: 7px 8px;
            text-align: left;
            white-space: nowrap;
            border-bottom: 1.5px solid #e0d5c5;
        }
        .group-table td {
            padding: 7px 8px;
            border-bottom: 1px solid #f0ebe3;
            vertical-align: middle;
        }
        .group-table tr:last-child td {
            border-bottom: none;
        }
        .group-table tr:hover td {
            background: #FDFAF6;
        }
        .group-table .col-code {
            color: #888;
            font-size: 11px;
            white-space: nowrap;
        }
        .group-table .col-date {
            color: #333;
            white-space: nowrap;
        }
        .group-table .col-type {
            color: #C9A96E;
            font-weight: 600;
            white-space: nowrap;
        }
        .group-table .col-price {
            color: #C9A96E;
            font-weight: 700;
            white-space: nowrap;
        }

        .group-remain {
            color: #666;
            font-size: 12px;
        }

        .no-groups-tip {
            text-align: center;
            color: #aaa;
            font-size: 13px;
            padding: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <div class="header-left"></div>
            <div class="header-title">小多吉</div>
            <div class="header-right"></div>
        </div>

        <!-- 聊天区域 -->
        <div class="chat-area" id="chatArea">
            <!-- 欢迎语 -->
            <div class="welcome-section">
                <div class="avatar">👩‍🌾</div>
                <div class="welcome-title">我叫<span>小多吉</span></div>
                <div class="welcome-subtitle">是您的产品助手</div>
                <div class="welcome-desc">
                    我可以为你快速解答旅行产品的行程信息、价格等问题，能推荐适合的旅行产品，也可以帮您快速下单哦
                </div>

            </div>
        </div>



        <!-- 底部区域 -->
        <div class="bottom-section">
            <!-- 输入框 -->
            <div class="input-area">
                <input type="text" class="input-box" id="userInput" placeholder="请输入消息">
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
            </div>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        // ============================================
        // 酒店代码映射（来自酒店表 2026-04-03）
        // ============================================
        const HOTEL_CODES = {
            // 南迦巴瓦
            '南迦巴瓦': 'STNJBW', '达林': 'STNJBW', '达': 'STNJBW',
            // 梅里
            '梅里': 'STML', '梅': 'STML',
            // 石月亮
            '石月亮': 'STSHYL', '石': 'STSHYL',
            // 香格里拉林卡
            '香格里拉林卡': 'STLKSGL', '香格里拉': 'STLKSGL', '香': 'STLKSGL',
            // 绿谷
            '绿谷': 'STLG', '绿': 'STLG',
            // 塔城
            '塔城': 'STTC', '塔': 'STTC',
            // 奔子栏
            '奔子栏': 'STBZL', '奔': 'STBZL',
            // 丙中洛
            '丙中洛': 'STBZHL', '丙': 'STBZHL',
            // 茨中
            '茨中': 'STCZH', '茨': 'STCZH',
            // 巴松措
            '巴松措': 'STLKBSC', '巴': 'STLKBSC', '巴松': 'STLKBSC',
            // 拉萨
            '拉萨': 'STLKLS', '拉': 'STLKLS',
            // 百巴
            '百巴': 'STBBZP', '百': 'STBBZP',
            // 来古
            '来古': 'STRWLG', '来': 'STRWLG',
            // 波密
            '波密': 'STBMLK', '波': 'STBMLK',
            // 丽江
            '丽江': 'STLKLJ', '丽': 'STLKLJ',
            // 普洱
            '普洱': 'STPELG', '普': 'STPELG',
            // 亚丁
            '亚丁': 'STYD', '亚': 'STYD',
            // 如美
            '如美': 'STMKRM',
            // 泸沽湖（英迪格）
            '泸沽湖': 'LGLHOTEL', '泸': 'LGLHOTEL'
        };

        const HOTEL_NAMES = {
            'STNJBW': '松赞南迦巴瓦山居',
            'STML': '松赞梅里山居',
            'STSHYL': '松赞石月亮山居',
            'STLKSGL': '松赞香格里拉林卡',
            'STLG': '松赞绿谷山居',
            'STTC': '松赞塔城山居',
            'STBZL': '松赞奔子栏山居',
            'STBZHL': '松赞丙中洛山居',
            'STCZH': '松赞茨中山居',
            'STLKBSC': '松赞巴松措林卡',
            'STLKLS': '松赞拉萨林卡',
            'STBBZP': '松赞百巴帐篷营地',
            'STRWLG': '松赞来古山居',
            'STBMLK': '松赞波密山居',
            'STLKLJ': '松赞丽江山居',
            'STPELG': '松赞普洱绿谷',
            'STYD': '松赞亚丁山居',
            'STMKRM': '松赞如美山居',
            'LGLHOTEL': '泸沽湖英迪格酒店'
        };

        // API配置
        const API_BASE = 'http://localhost:5123';

        // ============================================
        // 自然语言解析
        // ============================================
        function parseQueryForInventory(query) {
            const q = query.toLowerCase();

            // 检测是否是库存查询请求
            const inventoryKeywords = ['房间', '房价', '有房', '订房', '房间价格', '酒店', '山居', '林卡', '营'];
            const isInventoryQuery = inventoryKeywords.some(k => q.includes(k));

            if (!isInventoryQuery) return null;

            // 提取酒店名称
            let hotelCode = null;
            for (const [name, code] of Object.entries(HOTEL_CODES)) {
                if (q.includes(name.toLowerCase())) {
                    hotelCode = code;
                    break;
                }
            }

            // 如果没找到具体酒店，返回提示
            if (!hotelCode) {
                return { type: 'need_hotel' };
            }

            // 提取日期
            let beginDate = null, endDate = null;

            // 匹配 "4月22日" 或 "4月22"
            const dateMatch = q.match(/(\d{1,2})月(\d{1,2})[日]?/);
            if (dateMatch) {
                const month = parseInt(dateMatch[1]);
                const day = parseInt(dateMatch[2]);
                const year = new Date().getFullYear();
                const checkin = new Date(year, month - 1, day);
                const checkout = new Date(checkin);
                checkout.setDate(checkout.getDate() + 1);
                beginDate = formatDate(checkin);
                endDate = formatDate(checkout);
            }

            // 匹配日期范围 "4月22日到4月23日"
            const rangeMatch = q.match(/(\d{1,2})月(\d{1,2})[日]?.*到.*(\d{1,2})月(\d{1,2})[日]?/);
            if (rangeMatch) {
                const year = new Date().getFullYear();
                beginDate = formatDate(new Date(year, parseInt(rangeMatch[1]) - 1, parseInt(rangeMatch[2])));
                endDate = formatDate(new Date(year, parseInt(rangeMatch[3]) - 1, parseInt(rangeMatch[4])));
            }

            // 匹配今晚/明晚
            if (q.includes('今晚')) {
                const today = new Date();
                beginDate = formatDate(today);
                endDate = formatDate(new Date(today.setDate(today.getDate() + 1)));
            } else if (q.includes('明晚')) {
                const tomorrow = new Date();
                tomorrow.setDate(tomorrow.getDate() + 1);
                beginDate = formatDate(tomorrow);
                endDate = formatDate(new Date(tomorrow.setDate(tomorrow.getDate() + 1)));
            }

            return {
                type: 'inventory',
                hotelCode,
                hotelName: HOTEL_NAMES[hotelCode] || hotelCode,
                beginDate,
                endDate
            };
        }

        function formatDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        // ============================================
        // 库存查询（通过后端代理）
        // ============================================
        async function queryInventory(hotelCode, beginDate, endDate, roomTypes = null) {
            try {
                const resp = await fetch(`${API_BASE}/api/inventory-direct`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        hotel_codes: [hotelCode],
                        begin_date: beginDate,
                        end_date: endDate
                    })
                });

                if (!resp.ok) {
                    const errText = await resp.text();
                    return { error: true, message: `请求失败 (${resp.status}): ${errText.substring(0, 100)}` };
                }

                const data = await resp.json();
                if (!data.success) {
                    return { error: true, message: data.error || '查询失败' };
                }

                // 兼容原有 renderInventoryResult 函数格式
                return { error: false, data: { retVal: data.retVal }, hotelCode, beginDate, endDate };

            } catch(e) {
                return { error: true, message: `网络错误: ${e.message}` };
            }
        }

        // 过滤关键词
        const EXCLUDE_KEYWORDS = ['OTA', '飞猪', '携程'];

        // 过滤库存数据
        function filterInventoryData(entries) {
            return entries.filter(entry => {
                // 1. 产品状态：sta 为空或 'I' 才保留（null/空 表示有效房型）
                if (entry.sta && entry.sta !== 'I') return false;

                // 2. 产品名称不包含 OTA/飞猪/携程
                const productDesc = entry.productDesc || '';
                if (EXCLUDE_KEYWORDS.some(kw => productDesc.includes(kw))) return false;

                // 3. 业务类型不包含"目的地套餐"
                const categorySubDesc = entry.categorySubDesc || '';

                    </div>
                `;
            }

            const { data, hotelCode, beginDate, endDate } = result;
            const hotelName = HOTEL_NAMES[hotelCode] || hotelCode;

            // 计算晚数
            const checkin = new Date(beginDate);
            const checkout = new Date(endDate);
            const nights = Math.ceil((checkout - checkin) / (1000 * 60 * 60 * 24));

            let html = `
                <div class="inventory-card">
                    <div class="inventory-hotel">🏨 ${hotelName}</div>
                    <div class="inventory-dates">📅 ${beginDate} 入住 · ${endDate} 离店 · 共${nights}晚</div>
            `;

            // 收集所有行数据
            let rows = [];
            if (data && data.retVal && Array.isArray(data.retVal)) {
                const filtered = filterInventoryData(data.retVal);
                filtered.forEach(entry => {
                    const rmtypeDesc = entry.rmtypeDesc || '标准房';
                    const productDesc = entry.productDesc || '';
                    (entry.detailDtos || []).forEach(dayData => {
                        const rsvDate = dayData.rsvDate ? dayData.rsvDate.split(' ')[0] : beginDate;
                        rows.push({
                            date: rsvDate,
                            rmtypeDesc,
                            productDesc,
                            pmsNum: dayData.pmsNum || 0,
                            blockNum: dayData.blockNum || 0,
                            realPrice: dayData.realPrice || 0
                        });
                    });
                });
            }

            if (rows.length > 0) {
                // 按日期→房型排序
                rows.sort((a, b) => {
                    if (a.date !== b.date) return a.date.localeCompare(b.date);
                    return a.rmtypeDesc.localeCompare(b.rmtypeDesc);
                });

                // 预处理：合并相邻的同房型行
                const merged = [];
                rows.forEach(row => {
                    const last = merged[merged.length - 1];
                    if (last && last.rmtypeDesc === row.rmtypeDesc && last.date === row.date) {
                        // 同日期同房型，追加产品
                        last.products.push(row);
                    } else {
                        // 新行
                        merged.push({
                            date: row.date,
                            rmtypeDesc: row.rmtypeDesc,
                            products: [row]
                        });
                    }
                });

                html += `
                <div style="overflow-x:auto;">
                <table class="inventory-table">
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>房型</th>
                            <th>客房产品名称</th>
                            <th>公共池</th>
                            <th>预保留</th>
                            <th>房价/晚</th>
                        </tr>
                    </thead>
                    <tbody>
                `;
                merged.forEach(group => {
                    const count = group.products.length;
                    group.products.forEach((row, idx) => {
                        const total = row.pmsNum + row.blockNum;
                        const availColor = total > 0 ? '#2e7d32' : '#d32f2f';
                        const pmsText = row.pmsNum > 0 ? `${row.pmsNum}间` : '0间';
                        const blockText = row.blockNum > 0 ? `${row.blockNum}间` : '0间';
                        const priceText = row.realPrice > 0 ? `¥${row.realPrice.toLocaleString()}` : '—';
                        const rmtypeCell = idx === 0
                            ? `<td rowspan="${count}"><strong>${row.rmtypeDesc}</strong></td>`
                            : '';
                        html += `
                        <tr>
                            <td>${group.date.slice(5)}</td>
                            ${rmtypeCell}
                            <td>${row.productDesc || '—'}</td>
                            <td style="color:${availColor};font-weight:600;">${pmsText}</td>
                            <td style="color:${availColor};font-weight:600;">${blockText}</td>
                            <td style="color:#C9A96E;font-weight:600;">${priceText}</td>
                        </tr>
                    `;
                    });
                });
                html += `
                    </tbody>
                </table>
                </div>
                `;
            } else {
                html += `<div style="font-size:13px;color:#666;margin-top:8px;">暂无符合条件的库存数据</div>`;
            }

            html += '</div>';
            return html;

        // 从对话文本中提取月份
        function extractMonthFromQuery(text) {
            const now = new Date();
            const thisYear = now.getFullYear();
            // "4月" / "04月"
            const monthMatch = text.match(/(\d{1,2})月/);
            if (monthMatch) {
                const month = parseInt(monthMatch[1]);
                if (month >= 1 && month <= 12) {
                    return `${thisYear}-${String(month).padStart(2, '0')}`;
                }
            }
            // "本月" / "这个月"
            if (text.includes('本月') || text.includes('这个月')) {
                return `${thisYear}-${String(now.getMonth()+1).padStart(2, '0')}`;
            }
            // "下个月"
            if (text.includes('下个月')) {
                const next = new Date(thisYear, now.getMonth()+1, 1);
                return `${next.getFullYear()}-${String(next.getMonth()+1).padStart(2, '0')}`;
            }
            return null;
        }

        // 从对话文本中提取产品关键词（去掉意图词）
        function extractProductKeyword(text) {
            let kw = text;
            const intentWords = ['团期号', '团期', '什么时候出发', '几月出发', '出团日期', '出发日期', '哪天出发', '有哪些日期', '有团吗', '有团'];
            intentWords.forEach(w => { kw = kw.replace(w, ''); });
            kw = kw.replace(/[的是有查一下帮我吗？?。，、，]/g, '').trim();
            return kw;
        }

                            const booked = g.sold || (total - remaining);
                            const beginDate = (g.begin || '').slice(5);

                            const bizType = g.categorySubDesc || '主题团';

                            `;
                        });
                        html += `
                            </tbody>
                        </table>
                        </div>
                        `;
                    }
                    html += `</div>`;
                });

        }

        function estimatePrice(productId, adults, children, isPrivate, season = '平季') {
            let product = PRODUCTS[productId];
            if (!product) product = PRODUCTS['雪山圣湖布达拉'];

            const adultUnit = product.prices[season] || product.prices['平季'];
            const childUnit = Math.round(adultUnit * 0.74);
            const total = adultUnit * adults + childUnit * children;
            const privateMultiplier = isPrivate ? 1.10 : 1.0;
            const finalTotal = Math.round(total * privateMultiplier);

            return {
                total: finalTotal,
                adultUnit: Math.round(adultUnit * privateMultiplier),
                childUnit: Math.round(childUnit * privateMultiplier),
                nights: product.nights,
                days: product.days,
                isPrivate,
                season,
                vehicle: product.vehicle
            };
        }

        function generateRecommendation(query) {
            const q = query.toLowerCase();

            let productId = '雪山圣湖布达拉';
            let productName = '雪山圣湖布达拉';
            let destination = '拉萨·巴松措';
            let tags = ['主题团', '雪山', '圣湖', '布达拉宫'];

            if (q.includes('丽江') || q.includes('远方的家')) {
                productId = '回到远方的家';
                productName = '回到远方的家';
                destination = '丽江·塔城·香格里拉';
                tags = ['主题团', '民族文化', '非遗'];
            } else if (q.includes('梅里')) {
                productId = '天人之际';
                productName = '天人之际';
                destination = '奔子栏·梅里·香格里拉';
                tags = ['主题团', '雪山', '摄影'];
            } else if (q.includes('波密') || q.includes('冰川')) {
                productId = '探索生命的力量';
                productName = '探索生命的力量';
                destination = '波密·来古·南迦巴瓦';
                tags = ['主题团', '冰川', '生态'];
            }

            let adults = 2, children = 0;
            const isPrivate = q.includes('私享') || q.includes('管家');

            if (q.includes('2大1小')) { adults = 2; children = 1; }
            else if (q.includes('3大1小')) { adults = 3; children = 1; }
            else if (q.includes('1大1小')) { adults = 1; children = 1; }
            else if (q.includes('亲子') || q.includes('儿童')) { children = 1; }

            let season = '平季';
            const monthMatch = q.match(/(\d{1,2})月/);
            if (monthMatch) {
                const month = parseInt(monthMatch[1]);
                if (month >= 4 && month <= 10) season = '旺季';
                else if (month >= 11 || month <= 3) season = '淡季';
            }
            if (q.includes('旺季') || q.includes('暑假')) season = '旺季';
            if (q.includes('淡季')) season = '淡季';
            if (q.includes('春节') || q.includes('国庆')) season = '节日';

            const product = PRODUCTS[productId];
            const priceData = estimatePrice(productId, adults, children, isPrivate, season);
            const formatPrice = (p) => '¥' + p.toLocaleString();

            const highlightsHtml = product.highlights.map(h => 
                `<div class="highlight-item">${h}</div>`
            ).join('');

            const itineraryHtml = product.itinerary.map(item => `
                <div class="itinerary-item">
                    <div class="itinerary-day">${item.day}</div>
                    <div class="itinerary-location">${item.location}</div>
                    <div class="itinerary-activity">${item.activity}</div>
                </div>
            `).join('');

            const priceNote = children > 0 
                ? `成人${formatPrice(priceData.adultUnit)}/人 × ${adults}人 + 儿童${formatPrice(priceData.childUnit)}/人 × ${children}人`
                : `${formatPrice(priceData.adultUnit)}/人 × ${adults}人`;

            return `
                <p>根据您的需求，为您推荐：</p>
                <div class="product-card">
                    <div class="product-header">
                        <div class="product-image">🏔️</div>
                        <div class="product-info">
                            <div class="product-name">${productName}</div>
                            <div class="product-tags">
                                ${tags.map(t => `<span class="tag">${t}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                    <div class="highlights">
                        <div class="highlights-title">🌟 产品特色</div>
                        ${highlightsHtml}
                    </div>
                    <div class="itinerary">
                        <div class="itinerary-title">📅 行程安排（${product.nights}晚${product.days}天）</div>
                        <div class="itinerary-list">
                            ${itineraryHtml}
                        </div>
                    </div>
                    <div class="price-section">
                        <div class="price-main">${formatPrice(priceData.total)}</div>
                        <div class="price-unit">${children > 0 ? '起/家庭' : '起/人'}（${isPrivate ? '私享管家' : '标准团'}）</div>
                        <div class="price-detail">${destination} · ${season}价格</div>
                        <div class="price-detail" style="margin-top:6px;font-size:11px;">${priceNote}</div>
                        ${children > 0 ? `<div class="price-note">💡 儿童含早餐及下午茶，不含松赞林寺/亚丁/巴松措门票</div>` : ''}
                    </div>
                </div>
            `;
        }
    </script>
