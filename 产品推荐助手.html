<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小多吉 - 松赞产品助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #F8F6F3;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            max-height: 900px;
            background: #F8F6F3;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* 头部导航 */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: #F8F6F3;
            position: relative;
            z-index: 10;
        }

        .header-left {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-title {
            font-size: 17px;
            font-weight: 600;
            color: #333;
        }

        .header-right {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        /* 聊天区域 */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px 100px;
            position: relative;
        }

        .chat-area::-webkit-scrollbar {
            display: none;
        }

        /* 欢迎卡片 */
        .welcome-section {
            text-align: center;
            padding: 40px 20px;
            margin-left: -24px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #C9A96E 0%, #E8D5B5 100%);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 4px 20px rgba(201, 169, 110, 0.3);
        }

        .welcome-title {
            font-size: 22px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .welcome-title span {
            color: #C9A96E;
        }

        .welcome-subtitle {
            font-size: 18px;
            color: #666;
            margin-bottom: 16px;
        }

        .welcome-desc {
            font-size: 14px;
            color: #999;
            line-height: 1.8;
            max-width: 280px;
            margin: 0 auto;
        }

        /* 消息气泡 */
        .message {
            margin-bottom: 16px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-content {
            background: #fff;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            font-size: 14px;
            line-height: 1.7;
            color: #333;
        }

        .message.user .message-content {
            background: #C9A96E;
            color: #fff;
            margin-left: 40px;
        }

        /* 产品卡片 */
        .product-card {
            background: #fff;
            border-radius: 16px;
            padding: 16px;
            margin-top: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }

        .product-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
        }

        .product-image {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #F5F0E8 0%, #EDE6DC 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
        }

        .product-info {
            flex: 1;
        }

        .product-name {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        .product-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .tag {
            background: #F5F0E8;
            color: #8B7355;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 11px;
        }

        /* 亮点区域 */
        .highlights {
            background: #FAF8F5;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .highlights-title {
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .highlight-item {
            font-size: 13px;
            color: #666;
            line-height: 1.8;
            padding: 4px 0;
            border-bottom: 1px dashed #E8E4DE;
        }

        .highlight-item:last-child {
            border-bottom: none;
        }

        /* 行程时间线 */
        .itinerary {
            margin-top: 12px;
        }

        .itinerary-title {
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .itinerary-list {
            position: relative;
            padding-left: 20px;
        }

        .itinerary-list::before {
            content: '';
            position: absolute;
            left: 6px;
            top: 8px;
            bottom: 8px;
            width: 2px;
            background: #E8D5B5;
        }

        .itinerary-item {
            position: relative;
            padding: 10px 0;
            border-bottom: 1px solid #F5F0E8;
        }

        .itinerary-item:last-child {
            border-bottom: none;
        }

        .itinerary-item::before {
            content: '';
            position: absolute;
            left: -18px;
            top: 14px;
            width: 8px;
            height: 8px;
            background: #C9A96E;
            border-radius: 50%;
            border: 2px solid #fff;
        }

        .itinerary-day {
            font-size: 12px;
            font-weight: 600;
            color: #C9A96E;
            margin-bottom: 2px;
        }

        .itinerary-location {
            font-size: 13px;
            color: #333;
            font-weight: 500;
            margin-bottom: 2px;
        }

        .itinerary-activity {
            font-size: 12px;
            color: #999;
        }

        /* 价格区域 */
        .price-section {
            background: linear-gradient(135deg, #FAF8F5 0%, #F5F0E8 100%);
            border-radius: 12px;
            padding: 16px;
            margin-top: 12px;
            text-align: center;
        }

        .price-main {
            font-size: 32px;
            font-weight: 700;
            color: #C9A96E;
        }

        .price-unit {
            font-size: 13px;
            color: #999;
            margin-top: 4px;
        }

        .price-detail {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed #E8D5B5;
        }

        .price-note {
            font-size: 11px;
            color: #999;
            background: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            margin-top: 10px;
            text-align: left;
        }

        /* 底部区域 */
        .bottom-section {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: #F8F6F3;
            padding: 0 16px 20px;
        }

        /* 快捷功能卡片 */
        .quick-cards {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            overflow-x: auto;
            padding: 4px 0;
        }

        .quick-cards::-webkit-scrollbar {
            display: none;
        }

        .quick-card {
            flex-shrink: 0;
            width: 140px;
            background: #fff;
            border-radius: 12px;
            padding: 14px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .quick-card:active {
            transform: scale(0.98);
        }

        .quick-card-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .quick-card-text {
            font-size: 13px;
            color: #333;
            line-height: 1.5;
        }

        /* 输入区域 */
        .input-area {
            background: #fff;
            border-radius: 24px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }

        .voice-btn {
            width: 36px;
            height: 36px;
            background: #333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
            flex-shrink: 0;
            cursor: pointer;
        }

        .input-box {
            flex: 1;
            border: none;
            outline: none;
            font-size: 15px;
            color: #333;
            background: transparent;
            font-family: inherit;
        }

        .input-box::placeholder {
            color: #ccc;
        }

        .send-btn {
            width: 36px;
            height: 36px;
            background: #C9A96E;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
            flex-shrink: 0;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .send-btn:disabled {
            background: #ccc;
        }

        /* 加载动画 */
        .loading {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .loading span {
            width: 8px;
            height: 8px;
            background: #C9A96E;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading span:nth-child(1) { animation-delay: -0.32s; }
        .loading span:nth-child(2) { animation-delay: -0.16s; }
        .loading span:nth-child(3) { animation-delay: 0s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }


        /* 库存卡片 */
        .inventory-card {
            background: #fff;
            border-radius: 16px;
            padding: 16px;
            margin-top: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }

        .inventory-hotel {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .inventory-dates {
            font-size: 13px;
            color: #666;
            margin-bottom: 12px;
        }

        .room-type-item {
            background: #FAF8F5;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
        }

        .room-type-name {
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 4px;
        }

        .room-type-status {
            font-size: 12px;
            margin-bottom: 4px;
        }

        .room-type-price {
            font-size: 18px;
            font-weight: 600;
            color: #C9A96E;
        }

        .inventory-loading {
            text-align: center;
            padding: 20px;
            color: #999;
        }

        /* 快捷直查按钮 */
        .quick-lookup-btns {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }

        .ql-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            background: #fff;
            border: 1.5px solid #E8D5B5;
            border-radius: 14px;
            padding: 14px 22px;
            cursor: pointer;
            font-size: 13px;
            color: #5a3e2b;
            font-family: inherit;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(201,169,110,0.10);
        }

        .ql-btn:active {
            background: #FAF6EF;
            transform: scale(0.97);
        }

        .ql-icon {
            font-size: 26px;
        }

        /* 直查抽屉 */
        .lookup-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.35);
            z-index: 100;
        }

        .lookup-overlay.show {
            display: block;
        }

        .lookup-panel {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 20px 20px 0 0;
            z-index: 101;
            transition: transform 0.32s cubic-bezier(0.4,0,0.2,1);
            max-height: 88vh;
            overflow-y: auto;
        }

        .lookup-panel.show {
            transform: translateX(-50%) translateY(0);
        }

        .lookup-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px 10px;
            border-bottom: 1px solid #f0ebe3;
        }

        .lookup-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .lookup-close {
            background: none;
            border: none;
            font-size: 18px;
            color: #999;
            cursor: pointer;
            padding: 4px 8px;
        }

        .lookup-body {
            padding: 16px 20px 32px;
        }

        .lookup-field {
            margin-bottom: 14px;
        }

        .lookup-field label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
        }

        .lookup-field input,
        .lookup-field select {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #E8D5B5;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            color: #333;
            background: #FDFAF6;
            outline: none;
            box-sizing: border-box;
        }

        .lookup-field input:focus,
        .lookup-field select:focus {
            border-color: #C9A96E;
        }

        .lookup-field-row {
            display: flex;
        }

        .lookup-submit {
            width: 100%;
            background: #C9A96E;
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 13px;
            font-size: 15px;
            font-family: inherit;
            cursor: pointer;
            margin-top: 4px;
            transition: opacity 0.2s;
        }

        .lookup-submit:active {
            opacity: 0.85;
        }

        .lookup-submit:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .lookup-result {
            margin-top: 16px;
        }

        /* 团期结果卡 */
        .group-result-card {
            background: #FAF8F5;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 12px;
        }

        .group-result-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .group-result-meta {
            font-size: 12px;
            color: #999;
            margin-bottom: 10px;
        }

        .group-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed #E8D5B5;
            font-size: 13px;
        }

        .group-row:last-child {
            border-bottom: none;
        }

        .group-code {
            font-size: 11px;
            color: #999;
            font-family: monospace;
            margin-top: 2px;
        }

        .group-date {
            color: #333;
            font-weight: 500;
        }

        .group-price {
            color: #C9A96E;
            font-weight: 600;
        }

        .group-remain {
            color: #666;
            font-size: 12px;
        }

        .no-groups-tip {
            text-align: center;
            color: #aaa;
            font-size: 13px;
            padding: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <div class="header-left"></div>
            <div class="header-title">小多吉</div>
            <div class="header-right"></div>
        </div>

        <!-- 聊天区域 -->
        <div class="chat-area" id="chatArea">
            <!-- 欢迎语 -->
            <div class="welcome-section">
                <div class="avatar">👩‍🌾</div>
                <div class="welcome-title">我叫<span>小多吉</span></div>
                <div class="welcome-subtitle">是您的产品助手</div>
                <div class="welcome-desc">
                    我可以为你快速解答旅行产品的行程信息、价格等问题，能推荐适合的旅行产品，也可以帮您快速下单哦
                </div>
                <!-- 快捷直查入口 -->
                <div class="quick-lookup-btns">
                    <button class="ql-btn" onclick="openLookup('groups')">
                        <span class="ql-icon">📆</span>
                        <span>查团期号</span>
                    </button>
                    <button class="ql-btn" onclick="openLookup('hotel')">
                        <span class="ql-icon">🏨</span>
                        <span>查酒店库存</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- 直查抽屉（团期/酒店库存） -->
        <div class="lookup-overlay" id="lookupOverlay" onclick="closeLookup()"></div>
        <div class="lookup-panel" id="lookupPanel">
            <!-- 团期查询面板 -->
            <div id="panelGroups" class="lookup-pane">
                <div class="lookup-header">
                    <span class="lookup-title">📆 查团期号</span>
                    <button class="lookup-close" onclick="closeLookup()">✕</button>
                </div>
                <div class="lookup-body">
                    <div class="lookup-field">
                        <label>产品名称</label>
                        <input type="text" id="groupKeyword" placeholder="如：亚丁远山、梅里、雪山圣湖" />
                    </div>
                    <div class="lookup-field">
                        <label>月份（选填）</label>
                        <input type="month" id="groupMonth" />
                    </div>
                    <button class="lookup-submit" onclick="doGroupLookup()">查询团期</button>
                    <div id="groupResult" class="lookup-result"></div>
                </div>
            </div>
            <!-- 酒店库存面板 -->
            <div id="panelHotel" class="lookup-pane" style="display:none;">
                <div class="lookup-header">
                    <span class="lookup-title">🏨 查酒店库存</span>
                    <button class="lookup-close" onclick="closeLookup()">✕</button>
                </div>
                <div class="lookup-body">
                    <div class="lookup-field">
                        <label>酒店</label>
                        <select id="hotelSelect">
                            <option value="">请选择酒店</option>
                            <option value="STNJBW">南迦巴瓦山居</option>
                            <option value="STML">梅里山居</option>
                            <option value="STSHYL">石月亮山居</option>
                            <option value="STLKSGL">香格里拉林卡</option>
                            <option value="STLG">绿谷山居</option>
                            <option value="STTC">塔城山居</option>
                            <option value="STBZL">奔子栏山居</option>
                            <option value="STBZHL">丙中洛山居</option>
                            <option value="STCZH">茨中山居</option>
                            <option value="STLKBSC">巴松措林卡</option>
                            <option value="STLKLS">拉萨林卡</option>
                            <option value="STBBZP">百巴帐篷营地</option>
                            <option value="STRWLG">来古山居</option>
                            <option value="STBMLK">波密山居</option>
                            <option value="STLKLJ">丽江山居</option>
                            <option value="STPELG">普洱绿谷</option>
                            <option value="STYD">亚丁山居</option>
                            <option value="STMKRM">如美山居</option>
                            <option value="LGLHOTEL">泸沽湖英迪格</option>
                        </select>
                    </div>
                    <div class="lookup-field lookup-field-row">
                        <div style="flex:1;">
                            <label>入住</label>
                            <input type="date" id="hotelCheckin" />
                        </div>
                        <div style="flex:1;margin-left:10px;">
                            <label>离店</label>
                            <input type="date" id="hotelCheckout" />
                        </div>
                    </div>
                    <button class="lookup-submit" onclick="doHotelLookup()">查库存</button>
                    <div id="hotelResult" class="lookup-result"></div>
                </div>
            </div>
        </div>

        <!-- 底部区域 -->
        <div class="bottom-section">
            <!-- 输入框 -->
            <div class="input-area">
                <input type="text" class="input-box" id="userInput" placeholder="请输入消息">
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
            </div>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        // ============================================
        // 酒店代码映射（来自酒店表 2026-04-03）
        // ============================================
        const HOTEL_CODES = {
            // 南迦巴瓦
            '南迦巴瓦': 'STNJBW', '达林': 'STNJBW', '达': 'STNJBW',
            // 梅里
            '梅里': 'STML', '梅': 'STML',
            // 石月亮
            '石月亮': 'STSHYL', '石': 'STSHYL',
            // 香格里拉林卡
            '香格里拉林卡': 'STLKSGL', '香格里拉': 'STLKSGL', '香': 'STLKSGL',
            // 绿谷
            '绿谷': 'STLG', '绿': 'STLG',
            // 塔城
            '塔城': 'STTC', '塔': 'STTC',
            // 奔子栏
            '奔子栏': 'STBZL', '奔': 'STBZL',
            // 丙中洛
            '丙中洛': 'STBZHL', '丙': 'STBZHL',
            // 茨中
            '茨中': 'STCZH', '茨': 'STCZH',
            // 巴松措
            '巴松措': 'STLKBSC', '巴': 'STLKBSC', '巴松': 'STLKBSC',
            // 拉萨
            '拉萨': 'STLKLS', '拉': 'STLKLS',
            // 百巴

        // ============================================
        // 自然语言解析
        // ============================================
        function parseQueryForInventory(query) {
            const q = query.toLowerCase();

            // 检测是否是库存查询请求
            const inventoryKeywords = ['房间', '房价', '有房', '订房', '房间价格', '酒店', '山居', '林卡', '营'];
            const isInventoryQuery = inventoryKeywords.some(k => q.includes(k));

            if (!isInventoryQuery) return null;

            // 提取酒店名称
            let hotelCode = null;
            for (const [name, code] of Object.entries(HOTEL_CODES)) {
                if (q.includes(name.toLowerCase())) {
                    hotelCode = code;
                    break;
                }
            }

            // 如果没找到具体酒店，返回提示
            if (!hotelCode) {
                return { type: 'need_hotel' };
            }

            // 提取日期
            let beginDate = null, endDate = null;

            // 匹配 "4月22日" 或 "4月22"
            const dateMatch = q.match(/(\d{1,2})月(\d{1,2})[日]?/);
            if (dateMatch) {
                const month = parseInt(dateMatch[1]);
                const day = parseInt(dateMatch[2]);
                const year = new Date().getFullYear();
                const checkin = new Date(year, month - 1, day);
                const checkout = new Date(checkin);
                checkout.setDate(checkout.getDate() + 1);
                beginDate = formatDate(checkin);
                endDate = formatDate(checkout);
            }

            // 匹配日期范围 "4月22日到4月23日"
            const rangeMatch = q.match(/(\d{1,2})月(\d{1,2})[日]?.*到.*(\d{1,2})月(\d{1,2})[日]?/);
            if (rangeMatch) {
                const year = new Date().getFullYear();
                beginDate = formatDate(new Date(year, parseInt(rangeMatch[1]) - 1, parseInt(rangeMatch[2])));
                endDate = formatDate(new Date(year, parseInt(rangeMatch[3]) - 1, parseInt(rangeMatch[4])));
            }

            // 匹配今晚/明晚
            if (q.includes('今晚')) {
                const today = new Date();
                beginDate = formatDate(today);
                endDate = formatDate(new Date(today.setDate(today.getDate() + 1)));
            } else if (q.includes('明晚')) {
                const tomorrow = new Date();
                tomorrow.setDate(tomorrow.getDate() + 1);
                beginDate = formatDate(tomorrow);
                endDate = formatDate(new Date(tomorrow.setDate(tomorrow.getDate() + 1)));
            }

            return {
                type: 'inventory',
                hotelCode,
                hotelName: HOTEL_NAMES[hotelCode] || hotelCode,
                beginDate,
                endDate
            };
        }

        function formatDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        // ============================================
        // 库存查询（通过后端代理）
        // ============================================
        async function queryInventory(hotelCode, beginDate, endDate, roomTypes = null) {
            try {
                const resp = await fetch(`${API_BASE}/api/inventory-direct`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        hotel_codes: [hotelCode],
                        begin_date: beginDate,
                        end_date: endDate
                    })
                });

                if (!resp.ok) {
                    const errText = await resp.text();
                    return { error: true, message: `请求失败 (${resp.status}): ${errText.substring(0, 100)}` };
                }

                const data = await resp.json();
                if (!data.success) {
                    return { error: true, message: data.error || '查询失败' };
                }

                // 兼容原有 renderInventoryResult 函数格式
                return { error: false, data: { retVal: data.retVal }, hotelCode, beginDate, endDate };

            } catch(e) {
                return { error: true, message: `网络错误: ${e.message}` };
            }
        }

        // 过滤关键词
        const EXCLUDE_KEYWORDS = ['OTA', '飞猪', '携程'];

        // 过滤库存数据
        function filterInventoryData(entries) {
            return entries.filter(entry => {
                // 1. 产品状态必须是已上架（sta = 'I'）
                if (entry.sta !== 'I') return false;

                // 2. 产品名称不包含 OTA/飞猪/携程
                const productDesc = entry.productDesc || '';
                if (EXCLUDE_KEYWORDS.some(kw => productDesc.includes(kw))) return false;

                // 3. 业务类型不包含"目的地套餐"
                const categorySubDesc = entry.categorySubDesc || '';
                if (categorySubDesc.includes('目的地套餐')) return false;

                return true;
            });
        }

        // 渲染库存结果
        function renderInventoryResult(result) {
            if (result.error) {
                return `
                    <div class="inventory-card">

                    </div>
                `;
            }

            const { data, hotelCode, beginDate, endDate } = result;
            const hotelName = HOTEL_NAMES[hotelCode] || hotelCode;

            // 计算晚数
            const checkin = new Date(beginDate);
            const checkout = new Date(endDate);
            const nights = Math.ceil((checkout - checkin) / (1000 * 60 * 60 * 24));

            let html = `
                <div class="inventory-card">
                    <div class="inventory-hotel">🏨 ${hotelName}</div>
                    <div class="inventory-dates">📅 ${beginDate} 入住 · ${endDate} 离店 · 共${nights}晚</div>
            `;

            // 解析API响应 - 正确的结构：retVal数组中每个条目包含房间信息和detailDtos数组
            let roomTypeEntries = [];
            if (data && data.retVal && Array.isArray(data.retVal)) {
                // 应用过滤条件
                roomTypeEntries = filterInventoryData(data.retVal);
            }

            if (roomTypeEntries.length > 0) {
                // 按日期分组，先收集所有日期
                const byDate = {};

                // 遍历每个房型+产品组合
                roomTypeEntries.forEach(entry => {
                    // 顶层：房间基本信息
                    const rmtypeDesc = entry.rmtypeDesc || '标准房';
                    const productDesc = entry.productDesc || '';
                    const rmtype = entry.rmtype || '';

                    // detailDtos：每日库存数据
                    const detailDtos = entry.detailDtos || [];

                    detailDtos.forEach(dayData => {
                        const rsvDate = dayData.rsvDate ? dayData.rsvDate.split(' ')[0] : beginDate;
                        const realPrice = dayData.realPrice || 0;
                        const pmsNum = dayData.pmsNum || 0;
                        const blockNum = dayData.blockNum || 0;

                        if (!byDate[rsvDate]) {
                            byDate[rsvDate] = [];
                        }
                        byDate[rsvDate].push({
                            rmtypeDesc,
                            productDesc,
                            rmtype,
                            realPrice,
                            pmsNum,
                            blockNum
                        });
                    });
                });

                // 按日期顺序展示
                Object.keys(byDate).sort().forEach(date => {
                    const dayRooms = byDate[date];
                    html += `<div style="font-size:12px;color:#C9A96E;font-weight:600;margin-top:12px;">📅 ${date}</div>`;

                    dayRooms.forEach(room => {
                        const totalAvailable = room.pmsNum + room.blockNum;
                        const statusClass = totalAvailable > 0 ? 'color:#2e7d32;' : 'color:#d32f2f;';
                        const statusText = totalAvailable > 0 ? '✅ 有房' : '❌ 满房';
                        const pmsText = room.pmsNum > 0 ? `公共池: ${room.pmsNum}间` : '';
                        const blockText = room.blockNum > 0 ? `预保留: ${room.blockNum}间` : '';

                        html += `
                            <div class="room-type-item">
                                <div class="room-type-name">
                                    ${room.rmtypeDesc}
                                    ${room.rmtype ? `<span style="color:#999;font-weight:normal;font-size:12px;">(${room.rmtype})</span>` : ''}
                                </div>
                                ${room.productDesc ? `<div style="font-size:11px;color:#666;">${room.productDesc}</div>` : ''}
                                <div style="display:flex;gap:12px;margin-top:4px;">
                                    <span class="room-type-status" style="${statusClass}">${statusText}</span>
                                    ${room.pmsNum > 0 ? `<span style="font-size:12px;color:#666;">${pmsText}</span>` : ''}
                                    ${room.blockNum > 0 ? `<span style="font-size:12px;color:#666;">${blockText}</span>` : ''}
                                </div>
                                ${totalAvailable > 0 && room.realPrice > 0 ? `<div class="room-type-price">¥${room.realPrice.toLocaleString()}/晚</div>` : ''}
                            </div>
                        `;
                    });

            } else {
                html += `<div style="font-size:13px;color:#666;margin-top:8px;">暂无符合条件的库存数据</div>`;
            }

            html += '</div>';
            return html;
        }

                    })
                });
                const data = await resp.json();

                if (!data.success) {
                    resultEl.innerHTML = `<p style="color:#d32f2f;font-size:13px;">⚠️ ${data.error || '查询失败'}</p>`;
                    return;
                }

                const hotelName = HOTEL_NAMES[hotelCode] || hotelCode;
                const entries = data.retVal || [];

                const checkinDate = new Date(checkin);
                const checkoutDate = new Date(checkout);
                const nights = Math.ceil((checkoutDate - checkinDate) / (1000 * 60 * 60 * 24));

                let html = `<div class="inventory-card">`;
                html += `<div class="inventory-hotel">🏨 ${hotelName}</div>`;
                html += `<div class="inventory-dates">📅 ${checkin} 入住 · ${checkout} 离店 · 共${nights}晚</div>`;

                if (entries.length > 0) {
                    const byDate = {};
                    entries.forEach(entry => {
                        const rmtypeDesc = entry.rmtypeDesc || '标准房';
                        const productDesc = entry.productDesc || '';
                        const rmtype = entry.rmtype || '';
                        (entry.detailDtos || []).forEach(dayData => {
                            const rsvDate = (dayData.rsvDate || checkin).split(' ')[0];
                            if (!byDate[rsvDate]) byDate[rsvDate] = [];
                            byDate[rsvDate].push({
                                rmtypeDesc, productDesc, rmtype,
                                realPrice: dayData.realPrice || 0,
                                pmsNum: dayData.pmsNum || 0,
                                blockNum: dayData.blockNum || 0
                            });
                        });
                    });

                    Object.keys(byDate).sort().forEach(date => {
                        html += `<div style="font-size:12px;color:#C9A96E;font-weight:600;margin-top:12px;">📅 ${date}</div>`;
                        byDate[date].forEach(room => {
                            const avail = room.pmsNum + room.blockNum;
                            const statusStyle = avail > 0 ? 'color:#2e7d32;' : 'color:#d32f2f;';
                            const statusText = avail > 0 ? '✅ 有房' : '❌ 满房';
                            html += `
                                <div class="room-type-item">
                                    <div class="room-type-name">
                                        ${room.rmtypeDesc}
                                        ${room.rmtype ? `<span style="color:#999;font-size:12px;font-weight:normal;">(${room.rmtype})</span>` : ''}
                                    </div>
                                    ${room.productDesc ? `<div style="font-size:11px;color:#666;">${room.productDesc}</div>` : ''}
                                    <div style="display:flex;gap:12px;margin-top:4px;">
                                        <span style="${statusStyle}font-size:12px;">${statusText}</span>
                                        ${room.pmsNum > 0 ? `<span style="font-size:12px;color:#666;">公共池: ${room.pmsNum}间</span>` : ''}
                                        ${room.blockNum > 0 ? `<span style="font-size:12px;color:#666;">预保留: ${room.blockNum}间</span>` : ''}
                                    </div>
                                    ${avail > 0 && room.realPrice > 0 ? `<div class="room-type-price">¥${room.realPrice.toLocaleString()}/晚</div>` : ''}
                                </div>
                            `;
                        });
                    });
                } else {
                    html += `<div style="font-size:13px;color:#666;margin-top:8px;">暂无符合条件的库存数据</div>`;
                }

                html += '</div>';
                resultEl.innerHTML = html;

            } catch (e) {
                resultEl.innerHTML = `<p style="color:#d32f2f;font-size:13px;">⚠️ 网络错误：${e.message}</p>`;
            } finally {
                btn.disabled = false;
                btn.textContent = '查库存';
            }
        }

        // ============================================
        // 发送消息
        // ============================================
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            sendBtn.disabled = true;

            // 隐藏欢迎区域
            const welcomeSection = document.querySelector('.welcome-section');
            if (welcomeSection) welcomeSection.style.display = 'none';

            // 显示用户消息
            addMessage(`<p>${text}</p>`, true);

            // 清空输入
            userInput.value = '';

            // 显示加载
            addLoading();

            // 检测"查团期号"意图
            const groupLookupKeywords = ['团期号', '团期', '什么时候出发', '几月出发', '出团日期'];
            const isGroupLookup = groupLookupKeywords.some(k => text.includes(k));
            if (isGroupLookup) {
                removeLoading();
                sendBtn.disabled = false;
                // 提取产品名关键词（去掉意图词）
                let kw = text;
                groupLookupKeywords.forEach(k => { kw = kw.replace(k, ''); });
                kw = kw.replace(/[的是有查一下帮我吗？?]/g, '').trim();
                openLookup('groups');
                if (kw) {
                    document.getElementById('groupKeyword').value = kw;
                }
                return;
            }

            // 解析查询意图
            const parsed = parseQueryForInventory(text);

            if (parsed && parsed.type === 'need_hotel') {
                removeLoading();
                addMessage(`
                    <p>好的，我可以帮您查询酒店房间和价格～</p>
                    <p style="margin-top:8px;">请问您想查询哪家酒店的库存？比如：</p>
                    <div style="margin-top:8px;font-size:13px;color:#666;">
                        • 南迦巴瓦山居<br>
                        • 梅里山居<br>
                        • 香格里拉林卡<br>
                        • 来古山居<br>
                        • 丽江/塔城/波密 等
                    </div>
                    <p style="margin-top:8px;">请告诉我酒店名称和入住日期，比如："4月22日南迦巴瓦有房吗"</p>
                `);
                sendBtn.disabled = false;
                return;
            }

            if (parsed && parsed.type === 'inventory') {
                // 需要日期但没解析到
                if (!parsed.beginDate) {
                    const tomorrow = new Date();
                    tomorrow.setDate(tomorrow.getDate() + 1);
                    parsed.beginDate = formatDate(tomorrow);
                    parsed.endDate = formatDate(new Date(tomorrow.setDate(tomorrow.getDate() + 1)));
                }

                // 执行库存查询
                const result = await queryInventory(parsed.hotelCode, parsed.beginDate, parsed.endDate);
                removeLoading();
                addMessage(renderInventoryResult(result));
                sendBtn.disabled = false;
                return;
            }

            // 调用后端推荐API
            removeLoading();
            await doRecommend(text);
            sendBtn.disabled = false;
        }

        function estimatePrice(productId, adults, children, isPrivate, season = '平季') {
            let product = PRODUCTS[productId];
            if (!product) product = PRODUCTS['雪山圣湖布达拉'];

            const adultUnit = product.prices[season] || product.prices['平季'];
            const childUnit = Math.round(adultUnit * 0.74);
            const total = adultUnit * adults + childUnit * children;
            const privateMultiplier = isPrivate ? 1.10 : 1.0;
            const finalTotal = Math.round(total * privateMultiplier);

            return {
                total: finalTotal,
                adultUnit: Math.round(adultUnit * privateMultiplier),
                childUnit: Math.round(childUnit * privateMultiplier),
                nights: product.nights,
                days: product.days,
                isPrivate,
                season,
                vehicle: product.vehicle
            };
        }

        function generateRecommendation(query) {
            const q = query.toLowerCase();

            let productId = '雪山圣湖布达拉';
            let productName = '雪山圣湖布达拉';
            let destination = '拉萨·巴松措';
            let tags = ['主题团', '雪山', '圣湖', '布达拉宫'];

            if (q.includes('丽江') || q.includes('远方的家')) {
                productId = '回到远方的家';
                productName = '回到远方的家';
                destination = '丽江·塔城·香格里拉';
                tags = ['主题团', '民族文化', '非遗'];
            } else if (q.includes('梅里')) {
                productId = '天人之际';
                productName = '天人之际';
                destination = '奔子栏·梅里·香格里拉';
                tags = ['主题团', '雪山', '摄影'];
            } else if (q.includes('波密') || q.includes('冰川')) {
                productId = '探索生命的力量';
                productName = '探索生命的力量';
                destination = '波密·来古·南迦巴瓦';
                tags = ['主题团', '冰川', '生态'];
            }

            let adults = 2, children = 0;
            const isPrivate = q.includes('私享') || q.includes('管家');

            if (q.includes('2大1小')) { adults = 2; children = 1; }
            else if (q.includes('3大1小')) { adults = 3; children = 1; }
            else if (q.includes('1大1小')) { adults = 1; children = 1; }
            else if (q.includes('亲子') || q.includes('儿童')) { children = 1; }

            let season = '平季';
            const monthMatch = q.match(/(\d{1,2})月/);
            if (monthMatch) {
                const month = parseInt(monthMatch[1]);
                if (month >= 4 && month <= 10) season = '旺季';
                else if (month >= 11 || month <= 3) season = '淡季';
            }
            if (q.includes('旺季') || q.includes('暑假')) season = '旺季';
            if (q.includes('淡季')) season = '淡季';
            if (q.includes('春节') || q.includes('国庆')) season = '节日';

            const product = PRODUCTS[productId];
            const priceData = estimatePrice(productId, adults, children, isPrivate, season);
            const formatPrice = (p) => '¥' + p.toLocaleString();

            const highlightsHtml = product.highlights.map(h => 
                `<div class="highlight-item">${h}</div>`
            ).join('');

            const itineraryHtml = product.itinerary.map(item => `
                <div class="itinerary-item">
                    <div class="itinerary-day">${item.day}</div>
                    <div class="itinerary-location">${item.location}</div>
                    <div class="itinerary-activity">${item.activity}</div>
                </div>
            `).join('');

            const priceNote = children > 0 
                ? `成人${formatPrice(priceData.adultUnit)}/人 × ${adults}人 + 儿童${formatPrice(priceData.childUnit)}/人 × ${children}人`
                : `${formatPrice(priceData.adultUnit)}/人 × ${adults}人`;

            return `
                <p>根据您的需求，为您推荐：</p>
                <div class="product-card">
                    <div class="product-header">
                        <div class="product-image">🏔️</div>
                        <div class="product-info">
                            <div class="product-name">${productName}</div>
                            <div class="product-tags">
                                ${tags.map(t => `<span class="tag">${t}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                    <div class="highlights">
                        <div class="highlights-title">🌟 产品特色</div>
                        ${highlightsHtml}
                    </div>
                    <div class="itinerary">
                        <div class="itinerary-title">📅 行程安排（${product.nights}晚${product.days}天）</div>
                        <div class="itinerary-list">
                            ${itineraryHtml}
                        </div>
                    </div>
                    <div class="price-section">
                        <div class="price-main">${formatPrice(priceData.total)}</div>
                        <div class="price-unit">${children > 0 ? '起/家庭' : '起/人'}（${isPrivate ? '私享管家' : '标准团'}）</div>
                        <div class="price-detail">${destination} · ${season}价格</div>
                        <div class="price-detail" style="margin-top:6px;font-size:11px;">${priceNote}</div>
                        ${children > 0 ? `<div class="price-note">💡 儿童含早餐及下午茶，不含松赞林寺/亚丁/巴松措门票</div>` : ''}
                    </div>
                </div>
            `;
        }
